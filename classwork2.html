<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Snap</title>
</head>

<body class="bg-gray-100 font-sans">

  <!-- NAVBAR -->
  <nav class="flex items-center justify-between px-8 py-6">
    
    <!-- Left -->
    <div class="flex items-center gap-10">
      <h1 class="text-2xl font-bold">snap</h1>

      <div class="hidden md:flex gap-8 text-gray-600">
        <span class="cursor-pointer hover:text-black">Features</span>
        <span class="cursor-pointer hover:text-black">Company</span>
        <span class="cursor-pointer hover:text-black">Careers</span>
        <span class="cursor-pointer hover:text-black">About</span>
      </div>
    </div>

    <!-- Right -->
    <div class="hidden md:flex items-center gap-6">
      <a href="#" class="text-gray-600 hover:text-black">Login</a>
      <a href="#" class="border border-gray-400 px-4 py-2 rounded-xl hover:bg-black hover:text-white transition">
        Register
      </a>
    </div>

  </nav>

  <!-- HERO -->
  <section class="flex flex-col md:flex-row items-center justify-between px-8 md:px-16 mt-10">

    <!-- TEXT -->
    <div class="max-w-xl space-y-6">
      <h1 class="text-5xl md:text-7xl font-bold leading-tight">
        Make <br> remote work
      </h1>

      <p class="text-gray-500 text-lg">
        Get your team in sync, no matter your location.
        Streamline processes, create team rituals,
        and watch productivity soar.
      </p>

      <button class="bg-black text-white px-6 py-3 rounded-xl hover:bg-gray-800 transition">
        Learn more
      </button>

      <!-- Logos -->
      <div class="flex gap-6 pt-6 opacity-60">
        <img src="images/client-databiz.svg" class="h-5" />
        <img src="images/client-audiophile.svg" class="h-5" />
        <img src="images/client-meet.svg" class="h-5" />
        <img src="images/client-maker.svg" class="h-5" />
      </div>
    </div>

    <!-- IMAGE / DESIGN -->
    <div class="mt-10 md:mt-0 relative">

      <!-- Геометрический дизайн -->
      <div class="w-[350px] h-[350px] bg-yellow-400 rounded-full flex items-center justify-center overflow-hidden">
        <img src="images/image-hero-desktop.png" class="object-cover w-full h-full" />
      </div>

      <!-- декоративные элементы -->
      <div class="absolute -top-10 -left-10 w-20 h-20 border-4 border-black rounded-full"></div>
      <div class="absolute top-10 -left-20 w-16 h-16 bg-black rounded-full"></div>
      <div class="absolute bottom-10 -left-10 w-0 h-0 border-l-[60px] border-l-transparent border-t-[60px] border-t-purple-500"></div>

      <div class="absolute -bottom-10 right-0 w-32 h-16 border-4 border-black rounded-full"></div>

    </div>

  </section>

</body>
</html>
